<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Minut · farewell countdowns</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0f1310;
      }
      .stage {
        position: fixed;
        inset: 0;
      }
      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        opacity: 0;
        transition: opacity 1s ease;
        pointer-events: none;
      }
      iframe.on {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <iframe id="a" src="alicja.html" title="Alicja"></iframe>
      <iframe id="b" src="kristian.html" title="Kristian"></iframe>
    </div>
    <script>
      const INTERVAL_MS = 60000;
      const a = document.getElementById("a");
      const b = document.getElementById("b");
      a.classList.add("on");
      let showA = true;
      setInterval(() => {
        showA = !showA;
        a.classList.toggle("on", showA);
        b.classList.toggle("on", !showA);
      }, INTERVAL_MS);
    </script>
  </body>
</html>
