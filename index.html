<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Minut · farewell countdowns</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0b0d;
      }
      .stage {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
      }
      .viewport {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      /* Desktop: constrain to a 16:9 rectangle centered with dark letterbox. */
      @media (min-width: 781px) {
        .viewport {
          aspect-ratio: 16 / 9;
          width: min(100vw, calc(100vh * 16 / 9));
          height: min(100vh, calc(100vw * 9 / 16));
        }
      }
      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        opacity: 0;
        transition: opacity 1s ease;
        pointer-events: none;
      }
      iframe.on {
        opacity: 1;
        pointer-events: auto;
      }
      /* Mobile: no letterbox, iframes fill; the child pages handle their own scrolling */
      @media (max-width: 780px) {
        html,
        body {
          overflow: hidden;
        }
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="viewport">
        <iframe id="a" src="alicja.html" title="Alicja"></iframe>
        <iframe id="b" src="kristian.html" title="Kristian"></iframe>
      </div>
    </div>
    <script>
      const INTERVAL_MS = 60000;
      const a = document.getElementById("a");
      const b = document.getElementById("b");
      a.classList.add("on");
      let showA = true;
      setInterval(() => {
        showA = !showA;
        a.classList.toggle("on", showA);
        b.classList.toggle("on", !showA);
      }, INTERVAL_MS);
    </script>
  </body>
</html>
